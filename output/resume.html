<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Resume</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f4f4f4;
    padding: 20px;
}

.container {
    max-width: 800px;
    background: white;
    margin: auto;
    padding: 30px;
}

.header {
    display: flex;
    align-items: center;
    gap: 20px;
    border-bottom: 2px solid #ddd;
    padding-bottom: 15px;
}

.profile-img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
}

.section {
    margin-top: 20px;
}

.section h2 {
    border-bottom: 2px solid black;
    padding-bottom: 5px;
}

.skills span {
    display: inline-block;
    margin: 5px;
    padding: 5px 10px;
    background: #eee;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <img src="{{ avatar }}" class="profile-img">
    <div>
        <h2>{{ name }}</h2>
        <p>{{ role }}</p>
        <a href="{{ github_url }}">GitHub</a> |
        <a href="https://linkedin.com/in/{{ linkedin }}">LinkedIn</a>
    </div>
</div>

<div class="section">
<h2>About</h2>
<p>{{ summary }}</p>
</div>

<div class="section">
<h2>Projects</h2>
{% for repo in repos %}
<p><b>{{ repo.name }}</b> - {{ repo.description }}</p>
{% endfor %}
</div>

<div class="section">
<h2>Skills</h2>
<div class="skills">
{% for skill in skills %}
<span>{{ skill }}</span>
{% endfor %}
</div>
</div>

<div class="section">
<h2>Download</h2>
<a href="resume.pdf" download>⬇ Download Resume</a>
</div>

</div>

</body>
</html>
